{% extends 'registration/base.html' %}
{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">이메일 인증 완료</h1>
    <p>이메일 인증이 완료되었습니다.</p>
    <p>5초 후 로그인 페이지로 이동합니다.</p>
    <a href="{% url 'login' %}" class="btn btn-primary">로그인 페이지로</a>
</div>
<script>
    setTimeout(function() {
        window.location.href = "{% url 'login' %}";
    }, 5000);
</script>
{% endblock %}
