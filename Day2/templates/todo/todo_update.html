{% extends 'todo/base.html' %}
{% block content %}

            {% csrf_token %}
            {{ form.as_p }}

        </form>
        <a href="{% url 'cbv_todo_list' %}" class="btn btn-secondary mt-2">목록</a>
    </div>
{% endblock %}
