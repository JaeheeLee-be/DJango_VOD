<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>{{ todo.title }}</h1>
    <hr>
    <p>설명: {{ todo.description }}</p>
    <p>시작일: {{ todo.start_date }}</p>
    <p>마감일: {{ todo.end_date }}</p>

    <p>수정일: {{ todo.modified_at }}</p>
    <p>완료여부: {{ todo.is_completed }}</p>
</body>
</html>
