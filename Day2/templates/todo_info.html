{% extends 'todo/base.html' %}
{% block content %}
    <h1>{{ todo.title }}</h1>
    <hr>
    <p>설명: {{ todo.description }}</p>
    <p>시작일: {{ todo.start_date }}</p>
    <p>마감일: {{ todo.end_date }}</p>
    <p>생성일: {{ todo.created_at }}</p>
    <p>수정일: {{ todo.modified_at }}</p>
    <p>완료여부: {{ todo.is_completed }}</p>

    <a href="{% url 'todo_update' todo.id %}"><button>수정하기</button></a>
    <a href="{% url 'todo_delete' todo.id %}"><button>삭제하기</button></a>
{% endblock %}
